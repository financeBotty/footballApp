name: Publicar Football Simulator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obtener repositorio
        uses: actions/checkout@v4
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Preparar sitio estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: football-simulator
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
