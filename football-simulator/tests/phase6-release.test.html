<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pruebas - Fase 6 y cierre</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body { max-width: 860px; margin: 2rem auto; padding: 0 1rem; font: 16px system-ui; background: #0f172a; color: #f1f5f9; }
    li { margin: .5rem 0; padding: .75rem; border-radius: .4rem; background: #1e293b; }
    .ok { border-left: 5px solid #10b981; } .fail { border-left: 5px solid #ef4444; }
  </style>
</head>
<body>
  <h1>Pruebas de Fase 6 y cierre</h1>
  <p id="summary">Ejecutando…</p>
  <ol id="results"></ol>
  <script src="../js/data.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/team-manager.js"></script>
  <script src="../js/league-engine.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    const results = [];
    const test = (name, assertion) => {
      try {
        if (!assertion()) throw new Error('La condición no se cumple');
        results.push({ name, ok: true });
      } catch (error) {
        results.push({ name, ok: false, error: error.message });
      }
    };
    const create = () => {
      const manager = new TeamManager();
      const league = new LeagueEngine(manager);
      league.generateSchedule();
      manager.getAllTeams().forEach(team => manager.autoSelectStartingXI(team.id));
      return { manager, league, team: manager.getAllTeams()[0] };
    };

    test('Inicializa disponibilidad y plan semanal', () => {
      const { manager, team } = create();
      return team.trainingPlan.focus === 'balanced' && team.players.every(player =>
        manager.getPlayerAvailability(player).available && player.suspensionMatches === 0);
    });

    test('Los ocho clubes tienen un escudo SVG propio', () => {
      const { manager } = create();
      const crests = manager.getAllTeams().map(team => team.crest);
      return crests.length === 8 && new Set(crests).size === 8 &&
        crests.every(crest => /^assets\/crests\/[a-z0-9-]+\.svg$/.test(crest));
    });

    test('Cada club explica su filosofía y su traducción futbolística', () => {
      return Object.values(DATA.PHILOSOPHICAL_IDENTITIES).every(identity =>
        identity.principle && identity.footballMeaning && identity.principle.length > 30 && identity.footballMeaning.length > 30
      );
    });

    test('El botón Mejor XI usa y guarda el once validado por el gestor', () => {
      const { manager, league, team } = create();
      team.startingXI = [];
      const ui = new UIManager();
      let saved = false;
      let failed = false;
      ui.gameApp = { userTeamId: team.id, teamManager: manager, leagueEngine: league, saveGame: () => { saved = true; } };
      ui.updateLineupWorkspace = () => {};
      ui.showSuccess = () => {};
      ui.showError = () => { failed = true; };
      ui.autoSelectLineupForFormation();
      const selected = Array.from(ui.squadSelection || []);
      return !failed && saved && selected.length === 11 && manager.validateLineup(team.id, selected).valid &&
        selected.filter(id => manager.getPlayer(team.id, id).position === 'GK').length === 1;
    });

    test('Alineación y táctica comparten una única pantalla Equipo', () => {
      const { manager, league, team } = create();
      team.crest = `../${team.crest}`;
      const fixture = document.createElement('div');
      fixture.innerHTML = '<div id="navigation"></div><main id="main-content"></main>';
      document.body.appendChild(fixture);
      const ui = new UIManager();
      ui.gameApp = {
        userTeamId: team.id, teamManager: manager, leagueEngine: league,
        saveGame: () => {}, showScreen: () => {}
      };
      ui.showSquad();
      const teamButtons = fixture.querySelectorAll('[data-screen="squad"]');
      const sectionButtons = fixture.querySelectorAll('[data-team-anchor]');
      fixture.querySelector('[data-team-anchor="team-roles-section"]')?.click();
      const valid = Boolean(fixture.querySelector('#lineup-pitch')) &&
        Boolean(fixture.querySelector('#team-tactics-section')) &&
        sectionButtons.length === 4 && fixture.querySelector('#team-roles-section')?.open &&
        fixture.querySelector('[data-team-anchor="team-roles-section"]')?.classList.contains('active') &&
        teamButtons.length === 1 && teamButtons[0].textContent.trim() === 'Equipo' &&
        !fixture.querySelector('[data-screen="tactics"]');
      fixture.remove();
      return valid;
    });

    test('La interfaz identifica y permite filtrar a los canteranos', () => {
      const { manager, team } = create();
      const reserve = team.reservePlayers[1];
      const promotion = manager.promoteReservePlayer(team.id, reserve.id, 1);
      const ui = new UIManager();
      return promotion.valid && ui.isAcademyPlayer(promotion.player) &&
        ui.renderAcademyBadge(promotion.player).includes('academy-badge') &&
        team.reservePlayers.every(player => ui.isAcademyPlayer(player));
    });

    test('Tres clics promocionan juntos a tres canteranos', () => {
      const { manager, league, team } = create();
      team.crest = `../${team.crest}`;
      const fixture = document.createElement('div');
      fixture.innerHTML = '<div id="navigation"></div><main id="main-content"></main>';
      document.body.appendChild(fixture);
      const ui = new UIManager();
      let saves = 0;
      ui.gameApp = { userTeamId: team.id, teamManager: manager, leagueEngine: league, saveGame: () => { saves++; } };
      const playersBefore = team.players.length;
      const reservesBefore = team.reservePlayers.length;
      ui.showSquad();
      [...fixture.querySelectorAll('.btn-select-reserve')].slice(0, 3).forEach(button => button.click());
      const valid = team.players.length === playersBefore + 3 && team.reservePlayers.length === reservesBefore - 3 &&
        team.reservePromotions.count === 3 && ui.reservePromotionSelection.size === 0 && saves === 1 &&
        fixture.querySelector('#academy-development-section')?.open;
      fixture.remove();
      return valid;
    });

    test('Permite alternar y conservar los tres estilos visuales', () => {
      const ui = new UIManager();
      const original = GameStorage.getSetting('visualTheme', '90s');
      const valid = ['classic', '90s', 'snes'].every(theme => {
        const selected = ui.applyVisualTheme(theme);
        return selected === theme && document.documentElement.dataset.visualTheme === theme &&
          document.body.classList.contains(theme === '90s' ? 'theme-retro-90s' : `theme-${theme}`) &&
          GameStorage.getSetting('visualTheme') === theme;
      });
      ui.applyVisualTheme(original);
      return valid;
    });

    test('Los textos de tarjetas claras mantienen contraste AA en 90s y SNES', () => {
      const ui = new UIManager();
      const original = GameStorage.getSetting('visualTheme', '90s');
      const host = document.createElement('article');
      host.className = 'dashboard-card';
      host.innerHTML = '<div class="team-info"><p>Posición: <strong>#1</strong></p></div>';
      document.body.appendChild(host);
      const channels = value => (value.match(/[\d.]+/g) || []).slice(0, 3).map(Number);
      const luminance = value => {
        const rgb = channels(value).map(channel => channel / 255)
          .map(channel => channel <= .04045 ? channel / 12.92 : ((channel + .055) / 1.055) ** 2.4);
        return .2126 * rgb[0] + .7152 * rgb[1] + .0722 * rgb[2];
      };
      const ratio = (foreground, background) => {
        const values = [luminance(foreground), luminance(background)].sort((a, b) => b - a);
        return (values[0] + .05) / (values[1] + .05);
      };
      const valid = ['90s', 'snes'].every(theme => {
        ui.applyVisualTheme(theme, false);
        const card = getComputedStyle(host);
        const text = getComputedStyle(host.querySelector('strong'));
        return ratio(text.color, card.backgroundColor) >= 4.5;
      });
      host.remove();
      ui.applyVisualTheme(original, false);
      return valid;
    });

    test('Impide alinear a un futbolista lesionado', () => {
      const { manager, team } = create();
      const player = manager.getStartingXI(team.id)[1];
      player.injury = { severity: 'moderate', matchesRemaining: 2, createdMatchday: 0 };
      const result = manager.validateLineup(team.id, team.startingXI);
      return !result.valid && result.error.includes(player.name);
    });

    test('La autoselección excluye lesionados y sancionados', () => {
      const { manager, team } = create();
      const [injured, suspended] = manager.getStartingXI(team.id).slice(1, 3);
      injured.injury = { severity: 'minor', matchesRemaining: 1, createdMatchday: 0 };
      suspended.suspensionMatches = 1;
      manager.autoSelectStartingXI(team.id);
      return !team.startingXI.includes(injured.id) && !team.startingXI.includes(suspended.id) &&
        manager.getStartingXI(team.id).length === 11;
    });

    test('Registra roja, acumulación de amarillas y lesión', () => {
      const { manager, team } = create();
      const player = team.players[4];
      player.yellowCardAccumulation = 4;
      manager.registerMatchConsequences(team.id, {
        players: { [player.id]: { id: player.id, teamId: team.id, appeared: true, redCards: 1, yellowCards: 1 } },
        injuries: [{ playerId: player.id, severity: 'moderate', matchesRemaining: 3 }]
      }, 2);
      return player.suspensionMatches === 1 && player.yellowCardAccumulation === 0 &&
        player.injury.matchesRemaining === 3 && player.injury.createdMatchday === 2;
    });

    test('Procesa recuperación exactamente una vez por jornada', () => {
      const { manager, league, team } = create();
      const player = team.players[5];
      player.injury = { severity: 'moderate', matchesRemaining: 2, createdMatchday: 0 };
      league.simulateMatchday(1);
      const afterFirst = player.injury && player.injury.matchesRemaining;
      const repeated = league.processMatchdayDevelopment(1);
      return afterFirst === 1 && repeated === false && player.injury.matchesRemaining === 1;
    });

    test('El plan de recuperación mejora el fitness', () => {
      const { manager, team } = create();
      const player = team.players[6];
      player.fitness = 40;
      manager.setTrainingPlan(team.id, 'recovery', 'high');
      manager.applyTrainingPlan(team);
      return player.fitness === 60;
    });

    test('Conserva disponibilidad y desarrollo al serializar', () => {
      const { manager, league, team } = create();
      team.players[3].suspensionMatches = 2;
      team.trainingPlan = { focus: 'technical', intensity: 'low' };
      league.processedDevelopmentMatchdays = [1, 2];
      const restoredManager = TeamManager.deserialize(manager.serialize());
      const restoredLeague = LeagueEngine.deserialize(league.serialize(), restoredManager);
      const restoredTeam = restoredManager.getTeam(team.id);
      return restoredTeam.players[3].suspensionMatches === 2 &&
        restoredTeam.trainingPlan.focus === 'technical' && restoredLeague.processedDevelopmentMatchdays.length === 2;
    });

    test('La IA adapta su entrenamiento al estado de la plantilla', () => {
      const { manager, team } = create();
      team.players.forEach(player => { player.fitness = 55; });
      manager.chooseAITrainingPlan(team.id);
      return team.trainingPlan.focus === 'recovery' && team.trainingPlan.intensity === 'low';
    });

    test('Rechaza archivos de backup inválidos', () => {
      const invalid = GameStorage.validateImport({ format: 'football-simulator-save', values: { GAME_STATE: '{}' } });
      return !invalid.valid && !!invalid.error;
    });

    test('Los filtros de Alineación ocultan las líneas no seleccionadas', () => {
      const host = document.createElement('div');
      host.innerHTML = `
        <button class="filter-chip active" data-squad-filter="DEF"></button>
        <button class="squad-player-card" data-player-line="GK"></button>
        <button class="squad-player-card" data-player-line="DEF"></button>`;
      document.body.appendChild(host);
      const ui = new UIManager();
      ui.filterSquadPlayerCards();
      const cards = host.querySelectorAll('.squad-player-card');
      const valid = cards[0].hidden && !cards[1].hidden && cards[0].classList.contains('is-filtered-out');
      host.remove();
      return valid;
    });

    test('Alineación cambia un titular por un suplente en dos clics', () => {
      const { manager, team } = create();
      const ui = new UIManager();
      ui.gameApp = { userTeamId: team.id, teamManager: manager };
      ui.squadSelection = new Set(team.startingXI);
      ui.updateLineupWorkspace = () => {};
      const outgoing = team.players.find(player => player.position !== 'GK' && ui.squadSelection.has(player.id) &&
        team.players.some(candidate => !ui.squadSelection.has(candidate.id) && candidate.position === player.position));
      const incoming = team.players.find(player => !ui.squadSelection.has(player.id) && player.position === outgoing.position);
      ui.toggleSquadPlayer(outgoing.id);
      const marked = ui.lineupReplacementId === outgoing.id && ui.squadSelection.size === 11;
      ui.toggleSquadPlayer(incoming.id);
      return marked && ui.squadSelection.size === 11 && !ui.squadSelection.has(outgoing.id) &&
        ui.squadSelection.has(incoming.id) && !ui.lineupReplacementId;
    });

    test('Alineación destaca y ordena los tres cambios con mejor encaje', () => {
      const { manager, team } = create();
      const ui = new UIManager();
      ui.gameApp = { userTeamId: team.id, teamManager: manager };
      ui.squadSelection = new Set(team.startingXI);
      const outgoing = team.players.find(player => player.position !== 'GK' && ui.squadSelection.has(player.id) &&
        team.players.some(candidate => !ui.squadSelection.has(candidate.id) && candidate.position === player.position));
      ui.lineupReplacementId = outgoing.id;
      const host = document.createElement('div');
      host.innerHTML = `<span id="lineup-replacement-help"></span>${team.players.map(player =>
        `<button class="squad-player-card" data-player-id="${player.id}"><em class="replacement-suggestion"></em></button>`).join('')}`;
      document.body.appendChild(host);
      ui.updateLineupReplacementSuggestions(team);
      const ranked = ['is-suggestion-best', 'is-suggestion-good', 'is-suggestion-option']
        .map(className => host.querySelector(`.${className}`));
      const scores = ranked.map(card => Number(card?.dataset.replacementScore));
      const valid = ranked.every(Boolean) && scores[0] >= scores[1] && scores[1] >= scores[2] &&
        ranked.every(card => card.querySelector('.replacement-suggestion').textContent.includes('%'));
      host.remove();
      return valid;
    });

    test('Los roles muestran un porcentaje calculado y actualizan su dificultad', () => {
      const { manager, team } = create();
      const player = team.players.find(item => item.position === 'CB');
      player.defending = 95;
      player.physical = 92;
      player.passing = 52;
      const marker = manager.getRoleSuitability(player, 'Central marcador');
      const distributor = manager.getRoleSuitability(player, 'Central con salida');
      const ui = new UIManager();
      const host = document.createElement('div');
      host.innerHTML = `<select class="player-role-select" data-player-id="${player.id}">
        <option data-suitability="${marker}">Central marcador</option>
        <option data-suitability="${distributor}">Central con salida</option>
      </select><small data-role-suitability="${player.id}"></small>`;
      document.body.appendChild(host);
      const select = host.querySelector('select');
      ui.updateRoleSuitability(select);
      const valid = marker > distributor && marker <= 99 && marker > 0 &&
        host.querySelector('small').textContent.includes(`${marker}%`);
      host.remove();
      return valid;
    });

    const list = document.getElementById('results');
    results.forEach(result => {
      const item = document.createElement('li');
      item.className = result.ok ? 'ok' : 'fail';
      item.textContent = `${result.ok ? '✓' : '✗'} ${result.name}${result.error ? `: ${result.error}` : ''}`;
      list.appendChild(item);
    });
    const passed = results.filter(result => result.ok).length;
    document.getElementById('summary').textContent = `${passed}/${results.length} pruebas superadas`;
    document.title = passed === results.length ? '✓ Fase 6 verificada' : '✗ Fallos en Fase 6';
  </script>
</body>
</html>
