<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pruebas - Fase 7</title>
  <style>
    body { max-width: 860px; margin: 2rem auto; padding: 0 1rem; font: 16px system-ui; background: #0f172a; color: #f1f5f9; }
    li { margin: .5rem 0; padding: .75rem; border-radius: .4rem; background: #1e293b; }
    .ok { border-left: 5px solid #10b981; } .fail { border-left: 5px solid #ef4444; }
  </style>
</head>
<body>
  <h1>Pruebas de la Fase 7</h1>
  <p id="summary">Ejecutando…</p>
  <ol id="results"></ol>
  <script src="../js/data.js"></script>
  <script src="../js/team-manager.js"></script>
  <script src="../js/match-engine.js"></script>
  <script src="../js/live-match-engine.js"></script>
  <script src="../js/match-renderer.js"></script>
  <script>
    const results = [];
    const test = (name, assertion) => {
      try {
        if (!assertion()) throw new Error('La condición no se cumple');
        results.push({ name, ok: true });
      } catch (error) {
        results.push({ name, ok: false, error: error.message });
      }
    };
    const createEngine = seed => {
      const manager = new TeamManager();
      manager.getAllTeams().forEach(team => manager.autoSelectStartingXI(team.id));
      const [home, away] = manager.getAllTeams();
      return { manager, home, away, engine: new LiveMatchEngine(home, away, manager, { userTeamId: home.id, seed }) };
    };

    test('Crea 22 jugadores, pelota y árbitro', () => {
      const { engine } = createEngine(1);
      const snapshot = engine.getVisualSnapshot();
      return snapshot.players.length === 22 && snapshot.ball && snapshot.referee;
    });

    test('Los dos porteros comparten color en el simulador', () => {
      const { engine } = createEngine(101);
      const goalkeepers = Object.values(engine.state.players).filter(player => player.position === 'GK' && player.onField);
      const allowedNames = ['verde', 'amarillo', 'blanco', 'rojo', 'azul', 'gris', 'morado'];
      return goalkeepers.length === 2 && goalkeepers[0].goalkeeperColor === goalkeepers[1].goalkeeperColor &&
        goalkeepers[0].goalkeeperColorName === goalkeepers[1].goalkeeperColorName &&
        goalkeepers.every(keeper => allowedNames.includes(keeper.goalkeeperColorName));
    });

    test('Cada club tiene un color local único y una equipación alternativa', () => {
      const manager = new TeamManager();
      const clubs = manager.getAllTeams();
      return new Set(clubs.map(team => team.primaryColor)).size === clubs.length &&
        clubs.every(team => /^#[0-9a-f]{6}$/i.test(team.primaryColor) && /^#[0-9a-f]{6}$/i.test(team.alternateColor) &&
          team.primaryColor !== team.alternateColor);
    });

    test('El visitante usa la alternativa cuando coinciden las equipaciones', () => {
      const manager = new TeamManager();
      manager.getAllTeams().forEach(team => manager.autoSelectStartingXI(team.id));
      const [home, away] = manager.getAllTeams();
      away.primaryColor = home.primaryColor;
      away.alternateColor = '#111827';
      const engine = new LiveMatchEngine(home, away, manager, { seed: 102 });
      return engine.state.teams.home.kitType === 'local' &&
        engine.state.teams.home.kitColor === home.primaryColor &&
        engine.state.teams.away.kitType === 'alternativa' &&
        engine.state.teams.away.kitColor === away.alternateColor;
    });

    test('Todas las formaciones mantienen tres líneas y al menos tres defensas', () => {
      return Object.keys(DATA.FORMATIONS).every((formationName, index) => {
        const manager = new TeamManager();
        const [home, away] = manager.getAllTeams();
        manager.setFormation(home.id, formationName);
        manager.autoSelectStartingXI(home.id);
        manager.autoSelectStartingXI(away.id);
        const engine = new LiveMatchEngine(home, away, manager, { seed: 100 + index });
        const numbers = formationName.split('-').map(Number);
        const expectedDefense = numbers[0];
        const expectedAttack = numbers[numbers.length - 1];
        const expectedMidfield = 10 - expectedDefense - expectedAttack;
        const lines = engine.onField('home').reduce((counts, player) => {
          counts[player.formationLine] = (counts[player.formationLine] || 0) + 1;
          return counts;
        }, {});
        const xByLine = engine.onField('home').reduce((values, player) => {
          if (!values[player.formationLine]) values[player.formationLine] = new Set();
          values[player.formationLine].add(player.baseX);
          return values;
        }, {});
        return expectedDefense >= 3 && lines.gk === 1 && lines.def === expectedDefense &&
          lines.mid === expectedMidfield && lines.att === expectedAttack &&
          ['gk', 'def', 'mid', 'att'].every(line => xByLine[line].size === 1);
      });
    });

    test('Recompone automáticamente un once incompleto antes de jugar', () => {
      const manager = new TeamManager();
      const team = manager.getAllTeams()[0];
      manager.autoSelectStartingXI(team.id);
      team.startingXI = team.startingXI.slice(0, 7);
      const repaired = manager.ensureValidStartingXI(team.id);
      return repaired.valid && repaired.repaired && manager.getStartingXI(team.id).length === 11 &&
        manager.validateLineup(team.id, team.startingXI).valid;
    });

    test('Completa el once con juveniles cuando faltan jugadores disponibles', () => {
      const manager = new TeamManager();
      const team = manager.getAllTeams()[0];
      const keeper = team.players.find(player => player.position === 'GK');
      const outfield = team.players.filter(player => player.position !== 'GK').slice(0, 9);
      const kept = new Set([keeper.id, ...outfield.map(player => player.id)]);
      team.players.forEach(player => {
        if (!kept.has(player.id)) player.suspensionMatches = 1;
      });
      const reserveBefore = team.reservePlayers.length;
      const repaired = manager.ensureValidStartingXI(team.id, true);
      return repaired.valid && repaired.promoted.length === 1 && repaired.promoted[0].emergencyPromotion === true &&
        team.reservePlayers.length === reserveBefore - 1 && team.reservePromotions.count === 0 &&
        manager.getStartingXI(team.id).length === 11;
    });

    test('Permite un once con jugadores adaptados sin bloqueos por línea', () => {
      const manager = new TeamManager();
      const team = manager.getAllTeams()[0];
      const keeper = team.players.find(player => player.position === 'GK');
      const outfield = team.players.filter(player => player.position !== 'GK').slice(0, 10);
      outfield.forEach(player => { player.position = 'ST'; });
      const result = manager.validateLineup(team.id, [keeper.id, ...outfield.map(player => player.id)]);
      return result.valid && result.adapted.length >= 7;
    });

    test('Todas las posiciones visibles tienen traducción española', () => {
      const englishCodes = new Set(['GK', 'RB', 'CB', 'LB', 'CDM', 'CM', 'CAM', 'RW', 'LW', 'ST', 'RM', 'LM']);
      return DATA.VALID_POSITIONS.every(position => {
        const shortLabel = DATA.getPositionLabel(position);
        const fullLabel = DATA.getPositionLabel(position, true);
        return shortLabel && fullLabel && !englishCodes.has(shortLabel) && fullLabel !== position;
      });
    });

    test('Los titulares ocupan los puestos marcados por la formación', () => {
      const { engine } = createEngine(110);
      return ['home', 'away'].every(side => {
        const team = engine.state.teams[side];
        return team.formationAssignments.length === 11 && team.formationAssignments.every(assignment => {
          const player = engine.state.players[assignment.playerId];
          return player.assignedPosition === assignment.slotPosition && player.formationLine === assignment.line;
        });
      });
    });

    test('Aplica instrucciones durante el partido', () => {
      const { engine, home } = createEngine(2);
      const result = engine.applyTactics(home.id, { mentality: 'Ofensiva', pressure: 'Alta', setPiecePreference: 'Disparar' });
      const tactics = engine.getTeamState(home.id).tactics;
      return result.valid && tactics.mentality === 'Ofensiva' && tactics.pressure === 'Alta' && tactics.setPiecePreference === 'Disparar';
    });

    test('Permite cambiar a 3-4-3 durante el partido y recoloca las líneas', () => {
      const { engine, home } = createEngine(202);
      const result = engine.changeFormation(home.id, '3-4-3');
      const state = engine.getTeamState(home.id);
      const lines = engine.onField('home').reduce((counts, player) => {
        counts[player.formationLine] = (counts[player.formationLine] || 0) + 1;
        return counts;
      }, {});
      return result.valid && state.formation === '3-4-3' && home.formation === '3-4-3' &&
        lines.gk === 1 && lines.def === 3 && lines.mid === 4 && lines.att === 3 &&
        state.formationAssignments.every(assignment => {
          const player = engine.state.players[assignment.playerId];
          return player.assignedPosition === assignment.slotPosition && player.baseX === engine.getAnchor(player, state, state.onField).x;
        });
    });

    test('La media efectiva cambia al adaptar un jugador a otro puesto', () => {
      const { manager, home } = createEngine(203);
      const player = manager.getStartingXI(home.id).find(item => item.position !== 'GK');
      const target = player.position === 'ST' ? 'CB' : 'ST';
      const natural = manager.getEffectiveOverall(player, player.position);
      const adapted = manager.getEffectiveOverall(player, target);
      const specialist = {
        position: 'CB', overall: 60, shooting: 95, pace: 95, physical: 90,
        dribbling: 95, passing: 70, defending: 45, stamina: 75, goalkeeping: 5
      };
      const unsuitable = {
        position: 'CB', overall: 80, shooting: 35, pace: 45, physical: 55,
        dribbling: 35, passing: 50, defending: 85, stamina: 60, goalkeeping: 5
      };
      return natural === player.overall && adapted !== natural && adapted >= 1 && adapted <= 99 &&
        manager.getEffectiveOverall(specialist, 'ST') > specialist.overall &&
        manager.getEffectiveOverall(unsuitable, 'ST') < unsuitable.overall;
    });

    test('Permite cinco sustituciones y bloquea la sexta', () => {
      const { engine, home } = createEngine(3);
      for (let index = 0; index < 5; index++) {
        const state = engine.getTeamState(home.id);
        const outgoing = state.onField.find(id => engine.state.players[id].position !== 'GK');
        const incoming = state.bench.find(id => !engine.state.players[id].appeared && engine.state.players[id].position !== 'GK');
        if (!engine.makeSubstitution(home.id, outgoing, incoming).valid) return false;
      }
      const state = engine.getTeamState(home.id);
      const sixth = engine.makeSubstitution(home.id, state.onField[1], state.bench.find(id => !engine.state.players[id].appeared && engine.state.players[id].position !== 'GK'));
      return state.substitutions === 5 && !sixth.valid && engine.onField('home').length === 11;
    });

    test('Nunca permite tener dos porteros en el mismo equipo', () => {
      const { engine, home } = createEngine(31);
      const state = engine.getTeamState(home.id);
      const outfield = state.onField.map(id => engine.state.players[id]).find(player => player.position !== 'GK');
      const reserveKeeper = state.bench.map(id => engine.state.players[id]).find(player => player.position === 'GK');
      const invalid = engine.makeSubstitution(home.id, outfield.id, reserveKeeper.id);
      const keepers = engine.onField('home').filter(player => player.position === 'GK');
      return !invalid.valid && keepers.length === 1 && engine.onField('home').length === 11;
    });

    test('Dos amarillas expulsan y reducen el equipo', () => {
      const { engine } = createEngine(4);
      const player = engine.onField('home').find(item => item.position !== 'GK');
      engine.giveCard(player, 'yellow');
      engine.giveCard(player, 'yellow');
      return player.redCards === 1 && !player.onField && engine.onField('home').length === 10;
    });

    test('Cada partido recibe un nivel tarjetero entre 1 y 10', () => {
      const { engine } = createEngine(401);
      const level = engine.state.referee.cardStrictness;
      return level >= 1 && level <= 10 && Number.isInteger(level) &&
        engine.state.events.some(event => event.type === 'REFEREE_PROFILE' && event.narration.includes(`${level}/10`));
    });

    test('Cada equipo tiene un capitán elegido por veteranía o calidad', () => {
      const { engine } = createEngine(403);
      return ['home', 'away'].every(side => {
        const team = engine.state.teams[side];
        const captains = engine.onField(side).filter(player => player.isCaptain);
        if (captains.length !== 1 || captains[0].id !== team.captainId) return false;
        const attribute = team.captainReason === 'veteranía' ? 'age' : 'overall';
        const maximum = Math.max(...engine.onField(side).map(player => engine.getPlayer(player.id)[attribute]));
        return engine.getPlayer(captains[0].id)[attribute] === maximum;
      });
    });

    test('El capitán puede pedir explicaciones al árbitro por gol o penalti', () => {
      const { engine } = createEngine(404);
      engine.random = () => 0;
      const captain = engine.state.players[engine.state.teams.home.captainId];
      const started = engine.maybeCaptainProtest('home', 'el penalti');
      const before = engine.distance(captain, engine.state.referee);
      engine.advanceCaptainProtest(1);
      return started && engine.state.animations.captainProtest &&
        engine.distance(captain, engine.state.referee) < before &&
        engine.state.events.some(event => event.type === 'CAPTAIN_PROTEST');
    });

    test('La plantilla tiene estrategia natural y cambiarla reduce la adaptación', () => {
      const { engine, manager, home } = createEngine(405);
      const natural = home.naturalStrategy;
      const alternative = Object.keys(DATA.TACTICAL_STRATEGIES).find(strategy => strategy !== natural);
      const validIdentity = DATA.TACTICAL_STRATEGIES[natural] && home.strategy === natural && home.tacticalFamiliarity === 100;
      const result = engine.applyTactics(home.id, { strategy: alternative });
      manager.updateTactics(home.id, { strategy: alternative });
      const state = engine.getTeamState(home.id);
      return validIdentity && result.valid && state.strategy === alternative &&
        state.tacticalFamiliarity < 100 && home.tacticalFamiliarity < 100;
    });

    test('Los planes A, B y C aplican todas sus instrucciones', () => {
      const { manager, home } = createEngine(414);
      return Object.values(DATA.MATCH_PLANS).every(plan => {
        const applied = manager.applyMatchPlan(home.id, plan.id);
        return applied && home.activeMatchPlan === plan.id &&
          Object.entries(plan.tactics).every(([key, value]) => home.tactics[key] === value);
      });
    });

    test('La adaptación táctica progresa con partidos y entrenamiento táctico', () => {
      const { manager, home } = createEngine(406);
      const alternative = Object.keys(DATA.TACTICAL_STRATEGIES).find(strategy => strategy !== home.naturalStrategy);
      manager.applyStrategy(home.id, alternative);
      manager.setTrainingPlan(home.id, 'tactical', 'high');
      const before = home.tacticalFamiliarity;
      manager.processCompletedMatchday(1);
      return home.tacticalFamiliarity > before && home.tacticalFamiliarity <= 100;
    });

    test('Permite subir como máximo tres juveniles del filial por jornada', () => {
      const { manager, home } = createEngine(407);
      const ids = home.reservePlayers.slice(0, 4).map(player => player.id);
      const results = ids.map(id => manager.promoteReservePlayer(home.id, id, 1));
      return results.slice(0, 3).every(result => result.valid) && !results[3].valid &&
        home.reservePromotions.count === 3 && ids.slice(0, 3).every(id => home.players.some(player => player.id === id));
    });

    test('El filial, sus promociones y la adaptación persisten al guardar', () => {
      const { manager, home } = createEngine(411);
      const reserveId = home.reservePlayers[0].id;
      const alternative = Object.keys(DATA.TACTICAL_STRATEGIES).find(strategy => strategy !== home.naturalStrategy);
      manager.promoteReservePlayer(home.id, reserveId, 2);
      manager.applyStrategy(home.id, alternative);
      manager.setTrainingPlan(home.id, 'tactical', 'high');
      manager.processCompletedMatchday(2);
      const familiarity = home.tacticalFamiliarity;
      const restored = TeamManager.deserialize(manager.serialize()).getTeam(home.id);
      return restored.players.some(player => player.id === reserveId) &&
        restored.reservePromotions.matchday === 2 && restored.reservePromotions.count === 1 &&
        restored.tacticalFamiliarity === familiarity;
    });

    test('Los roles individuales persisten y llegan al partido', () => {
      const { manager, home, away } = createEngine(408);
      const striker = manager.getStartingXI(home.id).find(player => player.position === 'ST');
      manager.setPlayerRole(home.id, striker.id, 'Falso nueve');
      const engine = new LiveMatchEngine(home, away, manager, { seed: 408 });
      return engine.state.players[striker.id].role === 'Falso nueve';
    });

    test('Las instrucciones situacionales se aplican durante el partido', () => {
      const { engine, home } = createEngine(409);
      const rival = engine.onField('away').find(player => player.position !== 'GK');
      const result = engine.applyTactics(home.id, { situationalInstruction: 'Presionar rival', pressTargetId: rival.id });
      return result.valid && engine.state.teams.home.tactics.situationalInstruction === 'Presionar rival' &&
        engine.state.teams.home.tactics.pressTargetId === rival.id;
    });

    test('Las órdenes rápidas cubren ataque, control, repliegue y agresividad', () => {
      const required = ['Atacar centro', 'Mantener posesión', 'Contraatacar', 'Colgar balones', 'Disparar más', 'Replegar', 'Entradas duras'];
      const { engine, home } = createEngine(415);
      const applied = required.every(order => engine.applyTactics(home.id, { situationalInstruction: order }).valid &&
        engine.getTeamState(home.id).tactics.situationalInstruction === order);
      return applied && required.every(order => DATA.QUICK_ORDERS.some(item => item.value === order)) &&
        new Set(DATA.QUICK_ORDERS.map(item => item.value)).size === DATA.QUICK_ORDERS.length;
    });

    test('Un gol aumenta la confianza del goleador', () => {
      const { engine } = createEngine(410);
      const striker = engine.onField('home').find(player => player.position === 'ST');
      const before = striker.confidence;
      engine.givePossession(striker.id);
      engine.startShot(striker);
      engine.random = () => 0;
      while (engine.state.ball.state === 'shooting') engine.advanceBall(.1);
      return striker.goals === 1 && striker.confidence > before;
    });

    test('Un árbitro 10 es más tarjetero y admite como máximo tres expulsados', () => {
      const { engine } = createEngine(402);
      engine.state.referee.cardStrictness = 1;
      const lenient = engine.getCardProbabilities();
      engine.state.referee.cardStrictness = 10;
      const strict = engine.getCardProbabilities();
      const candidates = [...engine.onField('home'), ...engine.onField('away')]
        .filter(player => player.position !== 'GK').slice(0, 4);
      candidates.forEach(player => engine.giveCard(player, 'red'));
      return strict.yellow > lenient.yellow && strict.red > lenient.red &&
        engine.totalRedCards() === 3 && candidates.filter(player => player.redCards).length === 3;
    });

    test('Una falta detiene el juego y prepara balón parado', () => {
      const { engine } = createEngine(5);
      const defender = engine.onField('away').find(item => item.position !== 'GK');
      const victim = engine.onField('home').find(item => item.position === 'ST') || engine.onField('home')[8];
      engine.startMatch();
      engine.commitFoul(defender, victim);
      const prepared = engine.state.phase === 'SET_PIECE' && engine.state.restart && engine.state.ball.state === 'set-piece';
      let guard = 0;
      while (engine.state.restart && guard++ < 120) engine.simulateNextStep(0.1);
      return prepared && !engine.state.restart && engine.state.status === 'playing';
    });

    test('Solo roja, lesión y descanso exigen continuar', () => {
      const { engine } = createEngine(501);
      const defender = engine.onField('away').find(item => item.position !== 'GK');
      const victim = engine.onField('home').find(item => item.position !== 'GK');
      engine.commitFoul(defender, victim);
      engine.giveCard(defender, 'red');
      const healthyPlayer = engine.onField('home').find(item => !item.injured && item.id !== victim.id) || victim;
      engine.injurePlayer(healthyPlayer);
      while (engine.state.animations.medical) engine.simulateNextStep(0.1, 1);
      const required = engine.getRequiredInjurySubstitution();
      if (required) {
        const team = engine.getTeamState(required.teamId);
        const incoming = team.bench.find(id => !engine.state.players[id].appeared);
        engine.makeSubstitution(required.teamId, required.playerId, incoming);
      }
      engine.state.minute = 45 + engine.state.addedTime.firstHalf - 0.05;
      engine.simulateNextStep(0.1);
      const foul = engine.state.events.find(event => event.type === 'FOUL');
      const red = engine.state.events.find(event => event.type === 'RED_CARD');
      const injury = engine.state.events.find(event => event.type === 'INJURY');
      const halfTime = engine.state.events.find(event => event.type === 'HALF_TIME');
      const attentionEvents = engine.state.events.filter(event => event.requiresAttention);
      return foul && !foul.requiresAttention && red && red.requiresAttention &&
        injury && injury.requiresAttention && halfTime && halfTime.requiresAttention &&
        attentionEvents.every(event => ['RED_CARD', 'INJURY', 'HALF_TIME'].includes(event.type));
    });

    test('El descanso prepara el saque de centro para el equipo que no inició', () => {
      const { engine } = createEngine(502);
      const expectedSide = engine.state.firstHalfKickoffSide === 'home' ? 'away' : 'home';
      engine.onField('home').concat(engine.onField('away')).forEach((player, index) => {
        player.x = 8 + index * 3;
        player.y = 5;
      });
      engine.state.ball.x = 84;
      engine.state.ball.y = 9;
      const preparedSide = engine.prepareSecondHalfKickoff();
      const owner = engine.state.players[engine.state.ball.ownerId];
      const centered = engine.state.ball.x === 50 && engine.state.ball.y === 34 && owner &&
        owner.side === expectedSide && Math.abs(owner.x - 50) < 1 && owner.y === 34;
      engine.state.phase = 'HALF_TIME';
      const resumed = engine.resumeSecondHalf();
      return preparedSide === expectedSide && centered && resumed && engine.state.phase === 'KICK_OFF' &&
        engine.state.half === 2;
    });

    test('Una colisión con el poseedor disputa el balón', () => {
      const { engine } = createEngine(51);
      const owner = engine.onField('home').find(item => item.position !== 'GK');
      const defender = engine.onField('away').find(item => item.position !== 'GK');
      owner.x = defender.x = 50;
      owner.y = defender.y = 34;
      engine.givePossession(owner.id);
      engine.startMatch();
      engine.simulateNextStep(0.1);
      return engine.state.ball.ownerId !== owner.id || engine.state.restart;
    });

    test('Cruzar junto a un rival puede cortar el pase, pero no lo entrega siempre', () => {
      const runPass = cutRoll => {
        const { engine } = createEngine(510 + Math.round(cutRoll * 10));
        const passer = engine.onField('home').find(player => ['CM', 'CAM', 'CDM'].includes(player.position));
        const receiver = engine.onField('home').find(player => player.id !== passer.id && ['CM', 'CAM', 'ST'].includes(player.position));
        const defender = engine.onField('away').find(player => player.position !== 'GK');
        passer.x = 30; passer.y = 34;
        receiver.x = receiver.targetX = 60; receiver.y = receiver.targetY = 34;
        engine.onField('away').filter(player => player.id !== defender.id).forEach((player, index) => {
          player.x = 85 + index * .1;
          player.y = 4 + index * 5;
        });
        defender.x = 45; defender.y = 34;
        engine.state.teams.home.tactics.passStyle = 'Corto';
        engine.givePossession(passer.id);
        engine.random = () => .99;
        engine.startPass(passer, receiver.id);
        engine.random = () => cutRoll;
        let guard = 0;
        while (engine.state.ball.state === 'passing' && guard++ < 80) engine.advanceBall(.02);
        return { engine, defender };
      };
      const cut = runPass(0);
      const continued = runPass(.99);
      return cut.engine.state.ball.ownerId === cut.defender.id &&
        cut.engine.state.events.some(event => event.type === 'INTERCEPTION') &&
        continued.engine.state.ball.ownerId !== continued.defender.id;
    });

    test('Un defensor encima puede robar, pero el atacante también puede escapar', () => {
      const prepareDuel = seed => {
        const { engine } = createEngine(seed);
        const attacker = engine.onField('home').find(player => player.position !== 'GK');
        const defender = engine.onField('away').find(player => player.position !== 'GK');
        attacker.x = defender.x = 50;
        attacker.y = defender.y = 34;
        engine.getPlayer(defender.id).defending = 100;
        engine.getPlayer(defender.id).physical = 100;

    test('1×, 3× y 5× usan múltiplos exactos sin alterar el paso lógico', () => {
      const { engine } = createEngine(21);
      const normal = engine.getPlaybackTiming(1);
      const fast = engine.getPlaybackTiming(3);
      const superFast = engine.getPlaybackTiming(5);
      return normal.logicStep === fast.logicStep && fast.logicStep === superFast.logicStep &&
        normal.playbackBoost === 1.75 && normal.tickDelayMs < normal.baseTickMs &&
        normal.animationSeconds === fast.animationSeconds && fast.animationSeconds === superFast.animationSeconds &&
        Math.abs(normal.tickDelayMs / fast.tickDelayMs - 3) < .0001 &&
        Math.abs(normal.tickDelayMs / superFast.tickDelayMs - 5) < .0001;
    });

    test('Cambiar de poseedor interpola el balón en vez de hacerlo aparecer', () => {
      const renderer = Object.create(MatchRenderer.prototype);
      const oldPosition = { x: 18, y: 12 };
      const newOwnerPosition = { x: 82, y: 54 };
      const visual = renderer.moveVisualTowards(oldPosition, newOwnerPosition, .85, 4);
      const travelled = Math.hypot(visual.x - oldPosition.x, visual.y - oldPosition.y);
      return travelled > 0 && travelled <= 4.000001 &&
        Math.hypot(visual.x - newOwnerPosition.x, visual.y - newOwnerPosition.y) > 0;
    });

    test('Cambiar la velocidad no modifica física, balón ni decisiones', () => {
      const source = createEngine(22);
      const fastManager = TeamManager.deserialize(source.manager.serialize());
      const superFastManager = TeamManager.deserialize(source.manager.serialize());
      const normal = source.engine;
      const fast = new LiveMatchEngine(fastManager.getTeam(source.home.id), fastManager.getTeam(source.away.id), fastManager, {
        userTeamId: source.home.id, seed: 22
      });
      const superFast = new LiveMatchEngine(superFastManager.getTeam(source.home.id), superFastManager.getTeam(source.away.id), superFastManager, {
        userTeamId: source.home.id, seed: 22
      });
      const engines = [[normal, 1], [fast, 3], [superFast, 5]];
      engines.forEach(([engine, speed]) => {
        engine.startMatch();
        const timing = engine.getPlaybackTiming(speed);
        for (let tick = 0; tick < 120; tick++) {
          engine.simulateNextStep(timing.logicStep, timing.animationSeconds);
        }
      });
      const comparableState = engine => JSON.stringify({
        minute: engine.state.minute,
        phase: engine.state.phase,
        score: engine.state.score,
        stats: engine.state.stats,
        players: engine.state.players,
        ball: engine.state.ball,
        events: engine.state.events,
        randomState: engine.randomState
      });
      return comparableState(normal) === comparableState(fast) && comparableState(fast) === comparableState(superFast);
    });

    test('La interpolación visual del balón se adapta suavemente a cada velocidad', () => {
      const { engine } = createEngine(23);
      const renderer = Object.create(MatchRenderer.prototype);
      renderer.engine = engine;
      renderer.logicStep = .05;
      renderer.setPlaybackSpeed(1);
      const normalAlpha = renderer.interpolationAlpha(16.7, .5);
      renderer.setPlaybackSpeed(3);
      const fastAlpha = renderer.interpolationAlpha(16.7, .5);
      renderer.setPlaybackSpeed(5);
      const superFastAlpha = renderer.interpolationAlpha(16.7, .5);
      return normalAlpha > 0 && normalAlpha < fastAlpha && fastAlpha < superFastAlpha && superFastAlpha < 1;
    });

    test('El render limita por frame los saltos de jugadores y balón', () => {
      const renderer = Object.create(MatchRenderer.prototype);
      const player = renderer.moveVisualTowards({ x: 10, y: 10 }, { x: 90, y: 60 }, .9, 2);
      const ball = renderer.moveVisualTowards({ x: 5, y: 5 }, { x: 95, y: 63 }, .9, 4.5);
      return Math.hypot(player.x - 10, player.y - 10) <= 2.000001 &&
        Math.hypot(ball.x - 5, ball.y - 5) <= 4.500001;
    });

    test('Los apoyos conservan carriles y las tres líneas mantienen distancias', () => {
      const { engine } = createEngine(240);
      engine.state.minute = 10;
      engine.state.transitionUntil = 0;
      Object.values(engine.state.players).forEach(player => { player.actionTargetUntil = 0; });
      const owner = engine.onField('home').find(player => player.formationLine === 'att');
      engine.givePossession(owner.id);
      engine.state.ball.x = owner.x;
      engine.state.ball.y = owner.y;
      engine.updateTacticalTargets();
      const outfield = engine.onField('home').filter(player => player.position !== 'GK');
      const laneOrder = outfield.every(player => player.id === owner.id || Math.abs(player.targetY - player.baseY) <= 13.1);
      const centers = ['def', 'mid', 'att'].map(line => {
        const players = outfield.filter(player => player.formationLine === line && player.id !== owner.id);
        return players.reduce((sum, player) => sum + player.targetX, 0) / players.length;
      });
      return laneOrder && centers[1] - centers[0] >= 8.5 && centers[2] - centers[1] >= 8.5 &&
        centers[1] - centers[0] <= 26 && centers[2] - centers[1] <= 26;
    });

    test('Los centrales no abandonan la línea para presionar lejos de su área', () => {
      const { engine } = createEngine(241);
      engine.state.minute = 10;
      engine.state.transitionUntil = 0;
      const awayOwner = engine.onField('away').find(player => player.formationLine === 'mid');
      awayOwner.x = 70;
      awayOwner.y = 34;
      engine.givePossession(awayOwner.id);
      engine.state.ball.x = awayOwner.x;
      engine.state.ball.y = awayOwner.y;
      engine.state.teams.home.tactics.pressure = 'Alta';
      engine.updateTacticalTargets();
      const homeDefenders = engine.getDefensiveUnit(engine.state.teams.home).defenders;
      return homeDefenders.every(player => !player.isPressing);
    });

    test('Una línea de fuera de juego baja hace retroceder al bloque sin desordenarlo', () => {
      const { engine } = createEngine(243);
      engine.state.minute = 10;
      engine.state.transitionUntil = 0;
      Object.values(engine.state.players).forEach(player => { player.actionTargetUntil = 0; });
      const owner = engine.onField('home').find(player => player.formationLine === 'def');
      owner.x = 50;
      owner.y = 34;
      engine.onField('away').filter(player => player.position !== 'GK').forEach(player => { player.x = 52; });
      engine.givePossession(owner.id);
      engine.state.ball.x = owner.x;
      engine.state.ball.y = owner.y;
      engine.state.teams.home.tactics.mentality = 'Muy Ofensiva';
      engine.updateTacticalTargets();
      const groups = ['def', 'mid', 'att'].map(line => engine.onField('home')
        .filter(player => player.formationLine === line && player.id !== owner.id));
      const centers = groups.map(players => players.reduce((sum, player) => sum + player.targetX, 0) / players.length);
      const attackersOnside = groups[2].every(player => player.targetX <= engine.getOffsideLine('home') - 1.1);
      return attackersOnside && centers[1] - centers[0] >= 8.5 && centers[2] - centers[1] >= 8.5;
    });

    test('Un balón suelto atrae un perseguidor por equipo y deja coberturas', () => {
      const { engine } = createEngine(242);
      engine.state.minute = 10;
      Object.values(engine.state.players).forEach(player => { player.actionTargetUntil = 0; });
      engine.makeBallLoose(50, 34);
      engine.resolveLooseBall();
      const active = engine.onField('home').concat(engine.onField('away'))
        .filter(player => player.actionTargetUntil > engine.state.minute);
      const direct = active.filter(player => player.actionTargetX === 50 && player.actionTargetY === 34);
      return direct.filter(player => player.side === 'home').length === 1 &&
        direct.filter(player => player.side === 'away').length === 1 && active.length === 4;
    });

    test('La línea defensiva conserva al portero detrás en ambos campos', () => {
      const { engine } = createEngine(24);
      const homeKeeper = engine.onField('home').find(player => player.position === 'GK');
      const awayKeeper = engine.onField('away').find(player => player.position === 'GK');
      const homeDefenders = engine.getDefensiveUnit(engine.state.teams.home).defenders;
      const awayDefenders = engine.getDefensiveUnit(engine.state.teams.away).defenders;
      const awayOwner = engine.onField('away').find(player => player.position !== 'GK');
      awayOwner.x = 5;
      engine.givePossession(awayOwner.id);
      engine.state.ball.x = 5;
      engine.state.teams.home.tactics.mentality = 'Muy Defensiva';
      engine.state.teams.home.tactics.defensiveLine = 'Baja';
      engine.updateTacticalTargets();
      const homeTargetsOrdered = homeDefenders.every(player => player.targetX >= homeKeeper.targetX + 5.4);

      const homeOwner = engine.onField('home').find(player => player.position !== 'GK');
      homeOwner.x = 95;
      engine.givePossession(homeOwner.id);
      engine.state.ball.x = 95;
      engine.state.teams.away.tactics.mentality = 'Muy Defensiva';
      engine.state.teams.away.tactics.defensiveLine = 'Baja';
      engine.updateTacticalTargets();
      const awayTargetsOrdered = awayDefenders.every(player => player.targetX <= awayKeeper.targetX - 5.4);
      return homeTargetsOrdered && awayTargetsOrdered;
    });

    test('Un estado defensivo cruzado se corrige antes de renderizar', () => {
      const { engine } = createEngine(25);
      const homeUnit = engine.getDefensiveUnit(engine.state.teams.home);
      const awayUnit = engine.getDefensiveUnit(engine.state.teams.away);
      homeUnit.keeper.x = 14;
      homeUnit.defenders.forEach(player => { player.x = 10; });
      awayUnit.keeper.x = 86;
      awayUnit.defenders.forEach(player => { player.x = 90; });
      engine.enforceDefensiveOrder();
      return homeUnit.defenders.every(player => player.x >= homeUnit.keeper.x + 2.1) &&
        awayUnit.defenders.every(player => player.x <= awayUnit.keeper.x - 2.1);
    });

    const list = document.getElementById('results');
    results.forEach(result => {
      const item = document.createElement('li');
      item.className = result.ok ? 'ok' : 'fail';
      item.textContent = `${result.ok ? '✓' : '✗'} ${result.name}${result.error ? `: ${result.error}` : ''}`;
      list.appendChild(item);
    });
    const passed = results.filter(result => result.ok).length;
    document.getElementById('summary').textContent = `${passed}/${results.length} pruebas superadas`;
    const firstFailure = results.find(result => !result.ok);
    document.title = passed === results.length ? '✓ Fase 7 verificada' : `✗ ${firstFailure.name}`;
  </script>
</body>
