<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08162b">
  <title>Football Cultureta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-retro-90s">
  <script>
    (() => {
      try {
        const selected = localStorage.getItem('fs_setting_visualTheme') || localStorage.getItem('fs_visualTheme') || '90s';
        const themes = { classic: 'theme-classic', '90s': 'theme-retro-90s', snes: 'theme-snes' };
        document.body.className = themes[selected] || themes['90s'];
      } catch (error) {
        // Si el navegador bloquea localStorage, UIManager conservará el tema 90s.
      }
    })();
  </script>
  <div id="app">
    <div id="navigation"></div>
    <div id="main-content"></div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/team-manager.js"></script>
  <script src="js/league-engine.js"></script>
  <script src="js/match-engine.js"></script>
  <script src="js/live-match-engine.js"></script>
  <script src="js/match-renderer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
